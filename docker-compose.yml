services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: mud-balance-ui:local
    container_name: mud-balance-ui
    # Run as host user so files written into the runs/ volume are owned by
    # the developer, not root. UID:GID matches the typical first non-root
    # user on a Linux host (kvirund's account on overseer is 1000:1000).
    user: "1000:1000"
    # No host port: gateway reaches us via the shared `gateway` network by
    # service hostname (mud-balance-ui:5001). Exposing on host would just
    # add attack surface. For local dev without the gateway, uncomment:
    # ports:
    #   - "127.0.0.1:5001:5001"
    expose:
      - "5001"
    volumes:
      # Persistent run history. Survives container rebuilds.
      - ./runs:/data/runs
      # Big world (production-ish snapshot from ~/worlds/world.tgz),
      # unpacked + converted to YAML once on the host. RW mount because
      # mud-sim's save_char path writes to etc/players when a PC is
      # extracted (idle, end-of-scenario). Stray writes are tolerable --
      # the world tree is regeneratable from the source archive.
      - ./world:/data/world
    environment:
      MUD_SIM_BIN: /opt/mud-sim
      MUD_SIM_WORLD_DIR: /data/world
      RUNS_DIR: /data/runs
      MUD_SIM_TIMEOUT_S: "120"
    networks:
      - gateway
    restart: unless-stopped

networks:
  gateway:
    external: true
    name: gateway
